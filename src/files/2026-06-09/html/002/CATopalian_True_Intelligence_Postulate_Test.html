<!DOCTYPE html>
<html>
<head>
    <title>True Intelligence — Postulate Two Test</title>
    <style>
        body  { background: #111; color: #eee; font-family: monospace; padding: 20px; max-width: 960px; }
        h1    { color: #1D9E75; }
        h2    { color: #888; font-size: 0.9em; font-weight: normal; margin-bottom: 20px; }
        .card { border: 1px solid #444; padding: 12px; margin: 8px 0; border-radius: 6px; }
        .green  { color: #1D9E75; }
        .orange { color: #BA7517; }
        .red    { color: #A32D2D; }
        .label  { font-size: 11px; color: #888; margin-bottom: 3px; }
        button  { background: #1D9E75; color: white; border: none; padding: 10px 20px;
                  font-size: 15px; cursor: pointer; border-radius: 4px; margin: 6px 4px; }
        button:hover { background: #0F6E56; }
        .verdict { font-size: 1.05em; padding: 16px; border-radius: 6px;
                   border: 1px solid #1D9E75; margin: 16px 0; }
        .node-row { display: flex; flex-wrap: wrap; gap: 3px; margin: 6px 0; }
        .node { width: 16px; height: 16px; border-radius: 2px; font-size: 7px;
                display: flex; align-items: center; justify-content: center; }
        .on  { background: #1D9E75; color: #fff; }
        .off { background: #222; color: #555; }
        table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
        td,th { border: 1px solid #333; padding: 5px 8px; text-align: left; }
        th    { color: #1D9E75; background: #1a1a1a; }
        tr:hover { background: #1a1a1a; }
    </style>

    <script>

        function ge(id)  { return document.getElementById(id); }
        function ce(tag) { return document.createElement(tag); }
        function ba(el)  { document.body.appendChild(el);      }

        // --- 16 PRIME GATES ---
        function tau(a,b)  { return 1; }
        function con(a,b)  { return 0; }
        function and(a,b)  { return a & b; }
        function nand(a,b) { return (a & b) ? 0 : 1; }
        function or(a,b)   { return a | b; }
        function nor(a,b)  { return (a | b) ? 0 : 1; }
        function xor(a,b)  { return a ^ b; }
        function xnor(a,b) { return (a ^ b) ? 0 : 1; }
        function lp(a,b)   { return a; }
        function lc(a,b)   { return a ? 0 : 1; }
        function rp(a,b)   { return b; }
        function rc(a,b)   { return b ? 0 : 1; }
        function mi(a,b)   { return (a === 0 && b === 1) ? 0 : 1; }
        function mni(a,b)  { return (a === 0 && b === 1) ? 1 : 0; }
        function ci(a,b)   { return (a === 1 && b === 0) ? 0 : 1; }
        function cni(a,b)  { return (a === 1 && b === 0) ? 1 : 0; }

        // --- COMBINATIONAL NODES (from think.js) ---
        function node17(a,b)  { return tau(a,b) & con(a,b) & mi(a,b) & ci(a,b) ? 1 : (tau(a,b)==1 && mi(a,b)==1) ? 1 : 0; }
        function node18(a,b)  { return (rp(a,b)==1 && xnor(a,b)==1) ? 1 : 0; }
        function node19(a,b)  { return (tau(a,b)==1 && cni(a,b)==1) ? 1 : 0; }
        function node20(a,b)  { return (lp(a,b)==1 && xor(a,b)==1) ? 1 : 0; }
        function node21(a,b)  { return (tau(a,b)==1 && and(a,b)==1) ? 1 : 0; }
        function node22(a,b)  { return (ci(a,b)==1 && nor(a,b)==1) ? 1 : 0; }
        function node23(a,b)  { return (ci(a,b)==1 && mni(a,b)==1) ? 1 : 0; }
        function node24(a,b)  { return (nor(a,b)==1 && rp(a,b)==1) ? 1 : 0; }
        function node25(a,b)  { return (nor(a,b)==1 && rc(a,b)==1) ? 1 : 0; }
        function node26(a,b)  { return (nand(a,b)==1 && xnor(a,b)==1) ? 1 : 0; }
        function node27(a,b)  { return (nor(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node28(a,b)  { return (nor(a,b)==1 && rc(a,b)==1) ? 1 : 0; }
        function node29(a,b)  { return (ci(a,b)==1 && or(a,b)==1) ? 1 : 0; }
        function node30(a,b)  { return (mi(a,b)==1 && or(a,b)==1) ? 1 : 0; }
        function node31(a,b)  { return (tau(a,b)==1 && or(a,b)==1) ? 1 : 0; }
        function node32(a,b)  { return (ci(a,b)==1 && cni(a,b)==1) ? 1 : 0; }
        function node33(a,b)  { return (mi(a,b)==1 && cni(a,b)==1) ? 1 : 0; }
        function node34(a,b)  { return (and(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node35(a,b)  { return (and(a,b)==1 && rc(a,b)==1) ? 1 : 0; }
        function node36(a,b)  { return (and(a,b)==1 && xor(a,b)==1) ? 1 : 0; }
        function node37(a,b)  { return (and(a,b)==1 && lp(a,b)==1) ? 1 : 0; }
        function node38(a,b)  { return (lp(a,b)==1 && and(a,b)==1) ? 1 : 0; }
        function node39(a,b)  { return (mi(a,b)==1 && nor(a,b)==1) ? 1 : 0; }
        function node40(a,b)  { return (mi(a,b)==1 && and(a,b)==1) ? 1 : 0; }
        function node41(a,b)  { return (tau(a,b)==1 && lp(a,b)==1) ? 1 : 0; }
        function node42(a,b)  { return (ci(a,b)==1 && lp(a,b)==1) ? 1 : 0; }
        function node43(a,b)  { return (or(a,b)==1 && rp(a,b)==1) ? 1 : 0; }
        function node44(a,b)  { return (ci(a,b)==1 && rc(a,b)==1) ? 1 : 0; }
        function node45(a,b)  { return (ci(a,b)==1 && xnor(a,b)==1) ? 1 : 0; }
        function node46(a,b)  { return (ci(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node47(a,b)  { return (and(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node48(a,b)  { return (mi(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node49(a,b)  { return (tau(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node50(a,b)  { return (ci(a,b)==1 && rc(a,b)==1) ? 1 : 0; }
        function node51(a,b)  { return (or(a,b)==1 && lc(a,b)==1) ? 1 : 0; }
        function node52(a,b)  { return (mi(a,b)==1 && rp(a,b)==1) ? 1 : 0; }
        function node53(a,b)  { return (mi(a,b)==1 && xor(a,b)==1) ? 1 : 0; }
        function node54(a,b)  { return (mi(a,b)==1 && lp(a,b)==1) ? 1 : 0; }
        function node55(a,b)  { return (and(a,b)==1 && lp(a,b)==1) ? 1 : 0; }
        function node56(a,b)  { return (mi(a,b)==1 && lp(a,b)==1) ? 1 : 0; }

        // --- THINK FUNCTION (from your think.js) ---
        // runs concept's a,b values through all 56 nodes
        function think(a, b)
        {
            return [
                tau(a,b), con(a,b), xor(a,b), xnor(a,b),
                and(a,b), nand(a,b), or(a,b), nor(a,b),
                mi(a,b), mni(a,b), ci(a,b), cni(a,b),
                lp(a,b), lc(a,b), rp(a,b), rc(a,b),
                node17(a,b), node18(a,b), node19(a,b), node20(a,b),
                node21(a,b), node22(a,b), node23(a,b), node24(a,b),
                node25(a,b), node26(a,b), node27(a,b), node28(a,b),
                node29(a,b), node30(a,b), node31(a,b), node32(a,b),
                node33(a,b), node34(a,b), node35(a,b), node36(a,b),
                node37(a,b), node38(a,b), node39(a,b), node40(a,b),
                node41(a,b), node42(a,b), node43(a,b), node44(a,b),
                node45(a,b), node46(a,b), node47(a,b), node48(a,b),
                node49(a,b), node50(a,b), node51(a,b), node52(a,b),
                node53(a,b), node54(a,b), node55(a,b), node56(a,b)
            ];
        }

        // --- NODE NAMES (from your diagram) ---
        const nodeNames = [
            'tau','con','xor','xnor','and','nand','or','nor',
            'mi','mni','ci','cni','lp','lc','rp','rc',
            'n17','n18','n19','n20','n21','n22','n23','n24',
            'n25','n26','n27','n28','n29','n30','n31','n32',
            'n33','n34','n35','n36','n37','n38','n39','n40',
            'n41','n42','n43','n44','n45','n46','n47','n48',
            'n49','n50','n51','n52','n53','n54','n55','n56'
        ];

        // --- CONCEPT ENCODING ---
        // Each concept defined by its (a,b) logical input pair
        // This is the KEY test — does the gate structure itself
        // produce meaningful differentiation from simple inputs?
        const conceptInputs =
        {
            // EXISTENCE states
            'true':       [1, 1],
            'false':      [0, 0],
            'maybe':      [1, 0],
            'unknown':    [0, 1],

            // RELATIONSHIPS
            'both':       [1, 1],
            'neither':    [0, 0],
            'only_A':     [1, 0],
            'only_B':     [0, 1],

            // we encode richer concepts by XORing multiple think() calls
        };

        // generate thought vectors
        const thoughts = {};
        for (let word in conceptInputs)
        {
            const ab = conceptInputs[word];
            thoughts[word] = think(ab[0], ab[1]);
        }

        // --- HAMMING ---
        function hamming(a, b)
        {
            let d = 0;
            for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
            return d;
        }

        function sim(a, b)
        {
            return Math.round((1 - hamming(a,b)/56)*100);
        }

        // --- FIND WHICH NODES DIFFER BETWEEN TWO CONCEPTS ---
        function diffNodes(wordA, wordB)
        {
            const a = thoughts[wordA];
            const b = thoughts[wordB];
            let diffs = [];
            for (let i = 0; i < a.length; i++)
            {
                if (a[i] !== b[i]) diffs.push(nodeNames[i]);
            }
            return diffs;
        }

        // --- RUN TEST ---
        function runTest()
        {
            ge('outputDiv').innerHTML = '';

            // PART 1: show all 4 base thought vectors
            let p1       = ce('div');
            p1.className = 'card';
            p1.innerHTML = '<div class="green" style="margin-bottom:8px">PART 1 — The 4 base thought vectors from think(a,b)</div>' +
                           '<div class="label">Each column is one of the 56 nodes. Green = active (1), dark = inactive (0)</div>';

            const words = Object.keys(thoughts);
            for (let w = 0; w < words.length; w++)
            {
                const word = words[w];
                const vec  = thoughts[word];
                const ab   = conceptInputs[word];
                const active = vec.filter(v=>v===1).length;

                let row           = ce('div');
                row.style.marginBottom = '10px';

                let lbl           = ce('div');
                lbl.className     = 'label';
                lbl.textContent   = '"' + word + '" (a=' + ab[0] + ', b=' + ab[1] + ')  —  ' + active + '/56 nodes active';
                row.appendChild(lbl);

                let nodeRow       = ce('div');
                nodeRow.className = 'node-row';

                for (let i = 0; i < vec.length; i++)
                {
                    let n       = ce('div');
                    n.className = 'node ' + (vec[i] ? 'on' : 'off');
                    n.title     = nodeNames[i] + ': ' + vec[i];
                    nodeRow.appendChild(n);
                }
                row.appendChild(nodeRow);
                p1.appendChild(row);
            }
            ge('outputDiv').appendChild(p1);

            // PART 2: similarity matrix
            let p2       = ce('div');
            p2.className = 'card';
            p2.innerHTML = '<div class="green" style="margin-bottom:8px">PART 2 — Similarity matrix (% similar in 56-bit space)</div>';

            let tbl  = ce('table');
            let hrow = ce('tr');
            let th0  = ce('th');
            th0.textContent = '';
            hrow.appendChild(th0);

            for (let w = 0; w < words.length; w++)
            {
                let th       = ce('th');
                th.textContent = words[w];
                hrow.appendChild(th);
            }
            tbl.appendChild(hrow);

            for (let i = 0; i < words.length; i++)
            {
                let row  = ce('tr');
                let td0  = ce('td');
                td0.textContent = words[i];
                td0.style.color = '#1D9E75';
                row.appendChild(td0);

                for (let j = 0; j < words.length; j++)
                {
                    let td  = ce('td');
                    const s = sim(thoughts[words[i]], thoughts[words[j]]);
                    td.textContent   = s + '%';
                    td.style.color   = i===j ? '#555' : s >= 70 ? '#1D9E75' : s >= 40 ? '#BA7517' : '#A32D2D';
                    row.appendChild(td);
                }
                tbl.appendChild(row);
            }
            p2.appendChild(tbl);
            ge('outputDiv').appendChild(p2);

            // PART 3: which nodes carry the semantic difference?
            let p3       = ce('div');
            p3.className = 'card';
            p3.innerHTML = '<div class="green" style="margin-bottom:8px">PART 3 — Node-level semantic weight analysis</div>' +
                           '<div class="label">Which specific nodes differ between opposite concepts?</div>';

            const pairs =
            [
                ['true',  'false',    'should be opposite'],
                ['maybe', 'unknown',  'both partial — should differ'],
                ['both',  'neither',  'should be opposite'],
                ['only_A','only_B',   'mirror — should be similar but different'],
            ];

            for (let p = 0; p < pairs.length; p++)
            {
                const wA    = pairs[p][0];
                const wB    = pairs[p][1];
                const note  = pairs[p][2];
                const diffs = diffNodes(wA, wB);
                const s     = sim(thoughts[wA], thoughts[wB]);

                let row           = ce('div');
                row.style.marginBottom = '10px';
                row.innerHTML =
                    '<div class="label">"' + wA + '" vs "' + wB + '" — ' + note + '</div>' +
                    '<div style="color:' + (s < 30 ? '#1D9E75' : s < 60 ? '#BA7517' : '#A32D2D') + '">Similarity: ' + s + '%</div>' +
                    '<div class="label">Nodes that differ (' + diffs.length + '): ' + diffs.join(', ') + '</div>';
                p3.appendChild(row);
            }
            ge('outputDiv').appendChild(p3);

            // PART 4: verdict
            const trueVsfalse  = sim(thoughts['true'],  thoughts['false']);
            const bothVneither = sim(thoughts['both'],   thoughts['neither']);
            const aVb          = sim(thoughts['only_A'], thoughts['only_B']);
            const maybeVunk    = sim(thoughts['maybe'],  thoughts['unknown']);

            const oppositeScore = (trueVsfalse < 30 ? 1 : 0) + (bothVneither < 30 ? 1 : 0);
            const mirrorScore   = (aVb > 30 && aVb < 80) ? 1 : 0;
            const partialScore  = (maybeVunk > 20 && maybeVunk < 80) ? 1 : 0;
            const total         = oppositeScore + mirrorScore + partialScore;
            const pct           = Math.round(total / 4 * 100);

            let verdict       = ce('div');
            verdict.className = 'verdict';
            verdict.innerHTML =
                '<div class="green" style="font-size:1.1em;margin-bottom:8px">POSTULATE TWO VERDICT</div>' +
                '<div style="font-size:1.4em;font-weight:bold;color:' + (pct>=75?'#1D9E75':pct>=50?'#BA7517':'#A32D2D') + '">' + pct + '% structural tests passed</div>' +
                '<div style="margin-top:8px;color:#888">true vs false: ' + trueVsfalse + '% | both vs neither: ' + bothVneither + '% | only_A vs only_B: ' + aVb + '% | maybe vs unknown: ' + maybeVunk + '%</div>' +
                '<div style="margin-top:12px">' +
                (pct>=75 ? '✓ POSTULATE TWO SUPPORTED — node positions carry structural semantic weight' :
                 pct>=50 ? '~ PARTIAL — gate structure shows some semantic differentiation' :
                           '✗ NEEDS REFINEMENT — encoding does not yet differentiate by node position') +
                '</div>';
            ge('outputDiv').appendChild(verdict);
        }

        function makeInterface()
        {
            let title         = ce('h1');
            title.textContent = 'True Intelligence — Postulate Two Test';
            ba(title);

            let sub         = ce('h2');
            sub.textContent = 'Postulate: The position of each node — defined by which gates combine to create it — carries semantic weight independently. Active node identity encodes meaning, not just active node count.';
            ba(sub);

            let btn         = ce('button');
            btn.textContent = '▶ Run Postulate Two Test';
            btn.onclick     = runTest;
            ba(btn);

            let out = ce('div');
            out.id  = 'outputDiv';
            ba(out);
        }

        function whenLoaded() { makeInterface(); }

    </script>
</head>
<body onload="whenLoaded()">
</body>
</html>
